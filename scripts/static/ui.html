<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Prokaryotes</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="stylesheet" href="/common.css">
    <style>
        .logout-btn {
            width: 32px;
            height: 32px;
            padding: 0;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            background-color: #ffffff;
            color: #6b7280;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .logout-btn:hover {
            background-color: #f3f4f6;
            border-color: #d1d5db;
            color: #374151;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            background-color: #ffffff;
        }

        .chat-wrapper {
            max-width: 48rem;
            margin: 0 auto;
            padding: 2rem 1.5rem 3rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
        }

        .message-actions {
            align-self: flex-start;
            margin-top: 0.35rem;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message.user {
            align-items: flex-end;
            justify-content: flex-start;
        }

        .message-content {
            white-space: pre-wrap;
            line-height: 1.6;
            max-width: 100%;
        }

        .message.assistant .message-actions {
            justify-content: flex-start;
            margin-left: -0.25rem;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .message.assistant:hover .message-actions {
            opacity: 1;
        }

        .message.user .message-actions {
            align-self: flex-end;
            margin-right: 0.15rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .message.user .fork-indicator {
            font-size: 0.75rem;
            color: #6b7280;
            min-width: 2.25rem;
            text-align: center;
            user-select: none;
        }

        .message.user .fork-nav-btn {
            width: 28px;
            height: 28px;
            font-size: 1rem;
            font-weight: 700;
            line-height: 1;
        }

        .message.assistant .message-content {
            background: transparent;
            border: none;
            cursor: pointer;
            border-radius: 0.5rem;
            padding: 0.5rem;
            margin-left: -0.5rem;
            transition: background-color 0.2s ease;
        }

        .message.assistant .message-content:hover {
            background-color: #f9fafb;
        }

        .icon-btn {
            width: 28px;
            height: 28px;
            padding: 0;
            border: 0;
            border-radius: 9999px;
            background-color: #ffffff;
            color: #6b7280;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .icon-btn:hover:not(:disabled) {
            background-color: #f3f4f6;
            border-color: #d1d5db;
            color: #374151;
        }

        .icon-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .message.user .message-content {
            background-color: #f3f4f6;
            border-radius: 1.25rem;
            padding: 0.8rem 1rem;
            max-width: 65%;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .message.user .message-content:hover {
            background-color: #e5e7eb;
        }

        .message.console .message-content {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', 'Courier New', monospace;
            font-size: 0.875rem;
            background-color: #fafafa;
            padding: 0.75rem 1rem;
            color: #374151;
            max-width: 80%;
        }

        .input-container {
            background-color: #ffffff;
            padding: 1rem;
            padding-bottom: calc(1rem + env(safe-area-inset-bottom))
        }

        .input-wrapper {
            max-width: 48rem;
            margin: 0 auto;
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.75rem;
            background-color: #ffffff;
            color: #111827;
            font-size: 1rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            min-height: 54px;
            max-height: 200px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .chat-input::placeholder {
            color: #9ca3af;
        }

        .chat-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .send-button {
            flex-shrink: 0;
            padding: 0;
            width: 54px;
            height: 54px;
            border: 1px solid #111827;
            border-radius: 0.75rem;
            background-color: #111827;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .send-button:hover:not(:disabled) {
            background-color: #2563eb;
            border-color: #2563eb;
        }

        .send-button:disabled {
            cursor: not-allowed;
            border-color: #d1d5db;
            background-color: #e5e7eb;
            color: #9ca3af;
        }

        .typing-indicator {
            display: inline-block;
            color: #6b7280;
            letter-spacing: 0.15em;
        }

        .typing-indicator::after {
            content: '···';
            animation: typing 1.4s infinite;
        }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.2; }
            30% { opacity: 1; }
        }

        .error-message {
            background-color: #fee2e2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <a class="logout-btn" href="/logout" title="Log out" aria-label="Log out">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <path d="M16 17l5-5-5-5"></path>
                    <path d="M21 12H9"></path>
                </svg>
            </a>
            <h1>prokaryotes</h1>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="chat-wrapper" id="chatWrapper">
            <!-- Messages will be added here -->
        </div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <textarea
                id="chatInput"
                class="chat-input"
                placeholder="Ask anything"
                rows="1"
                onkeydown="handleKeyDown(event)"
            ></textarea>
            <button id="sendButton" class="send-button" onclick="sendMessage()" disabled>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 2L11 13"></path>
                    <path d="M22 2l-7 20-4-9-9-4 20-7z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        let latitude = null;
        let longitude = null;
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                position => {
                    latitude = position.coords.latitude
                    longitude = position.coords.longitude
                },
                error => {
                    console.error(`Failed to get geolocation (${error.code}): ${error.message}`);
                },
                {
                    enableHighAccuracy: true, // GPS if available
                    maximumAge: 0, // No cache
                    timeout: 60000,
                }
            );
        }

        const apiUrl = '';
        const chatContainer = document.getElementById('chatContainer');
        const chatWrapper = document.getElementById('chatWrapper');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');

        let conversation_uuid = '';
        let messages = [];
        let isGenerating = false;
        let editSession = null;
        let editingParentId = null;
        let nextMessageId = 1;

        const messageTree = new Map();
        messageTree.set(0, {
            id: 0,
            role: 'root',
            content: '',
            parentId: null,
            children: [],
            activeChildId: null,
        });

        function setInputHeight() {
            chatInput.style.height = 'auto';
            chatInput.style.height = Math.min(chatInput.scrollHeight, 200) + 'px';
        }

        function getNode(nodeId) {
            return messageTree.get(nodeId) || null;
        }

        function createMessageNode(role, content, parentId) {
            const parentNode = getNode(parentId);
            if (!parentNode) return null;

            const node = {
                id: nextMessageId++,
                role: role,
                content: content,
                parentId: parentId,
                children: [],
                activeChildId: null,
            };

            messageTree.set(node.id, node);
            parentNode.children.push(node.id);
            parentNode.activeChildId = node.id;
            return node;
        }

        function getPathIdsToNode(nodeId) {
            const pathIds = [];
            let currentId = nodeId;

            while (currentId !== null && currentId !== 0) {
                const currentNode = getNode(currentId);
                if (!currentNode) break;
                pathIds.push(currentId);
                currentId = currentNode.parentId;
            }

            return pathIds.reverse();
        }

        function getActivePathIds() {
            const pathIds = [];
            let currentId = getNode(0).activeChildId;

            while (currentId !== null) {
                const currentNode = getNode(currentId);
                if (!currentNode) break;
                pathIds.push(currentId);
                currentId = currentNode.activeChildId;
            }

            return pathIds;
        }

        function getRenderablePathIds() {
            if (editingParentId !== null) {
                return getPathIdsToNode(editingParentId);
            }
            return getActivePathIds();
        }

        function syncRenderableMessages() {
            const pathIds = getRenderablePathIds();
            messages = pathIds.map(function(nodeId) {
                const node = getNode(nodeId);
                return {
                    id: node.id,
                    role: node.role,
                    content: node.content,
                };
            });
        }

        function renderMessages() {
            syncRenderableMessages();
            chatWrapper.innerHTML = '';
            messages.forEach((message, index) => {
                addMessage(message.role, message.content, index);
            });
        }

        function getCurrentLeafId() {
            const activePathIds = getActivePathIds();
            if (activePathIds.length === 0) return 0;
            return activePathIds[activePathIds.length - 1];
        }

        function activateLeaf(leafId) {
            const pathIds = getPathIdsToNode(leafId);
            const rootNode = getNode(0);
            rootNode.activeChildId = pathIds.length > 0 ? pathIds[0] : null;

            for (let i = 0; i < pathIds.length; i++) {
                const node = getNode(pathIds[i]);
                node.activeChildId = i + 1 < pathIds.length ? pathIds[i + 1] : null;
            }
        }

        function getConversationMessagesUpTo(nodeId) {
            const pathIds = getPathIdsToNode(nodeId);
            return pathIds.map(function(pathNodeId) {
                const node = getNode(pathNodeId);
                return {
                    role: node.role,
                    content: node.content,
                };
            });
        }

        function getUserSiblingIds(nodeId) {
            const node = getNode(nodeId);
            if (!node || node.role !== 'user' || node.parentId === null) return [];

            const parentNode = getNode(node.parentId);
            if (!parentNode) return [];

            return parentNode.children.filter(function(childId) {
                const childNode = getNode(childId);
                return !!childNode && childNode.role === 'user';
            });
        }

        function cancelEditSession() {
            if (!editSession || isGenerating) return false;

            activateLeaf(editSession.activeLeafId);
            editingParentId = editSession.editingParentId;
            chatInput.value = editSession.inputValue;
            setInputHeight();
            sendButton.disabled = !chatInput.value.trim() || isGenerating;

            editSession = null;
            renderMessages();
            return true;
        }

        chatInput.addEventListener('input', function() {
            setInputHeight();
            sendButton.disabled = !this.value.trim() || isGenerating;
        });

        function handleKeyDown(event) {
            if (event.key === 'Escape') {
                if (cancelEditSession()) {
                    event.preventDefault();
                }
                return;
            }

            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function addMessage(role, content, messageIndex = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            const messageData = messageIndex !== null ? messages[messageIndex] : null;
            const messageNode = messageData ? getNode(messageData.id) : null;

            // Add click handler for user messages to enable editing
            if (role === 'user' && messageNode) {
                contentDiv.setAttribute('data-message-index', messageIndex);
                contentDiv.setAttribute('title', 'Click to edit and restart from here');
                contentDiv.addEventListener('click', function() {
                    if (!isGenerating) {
                        editMessage(messageIndex);
                    }
                });
            }

            messageDiv.appendChild(contentDiv);

            // Add message actions with regen button
            let regenBtn = null;
            if (role === 'assistant' && messageNode) {
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'message-actions';

                regenBtn = document.createElement('button');
                regenBtn.type = 'button';
                regenBtn.className = 'icon-btn';
                regenBtn.setAttribute('aria-label', 'Regenerate response');
                regenBtn.title = 'Regenerate this response';

                // Simple "refresh" icon
                regenBtn.innerHTML = `
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12a9 9 0 0 1-9 9 9 9 0 0 1-6.36-2.64"/>
                        <path d="M3 12a9 9 0 0 1 9-9 9 9 0 0 1 6.36 2.64"/>
                        <path d="M21 3v6h-6"/>
                        <path d="M3 21v-6h6"/>
                    </svg>
                `;

                regenBtn.disabled = isGenerating;

                regenBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    if (!isGenerating) {
                        regenerateMessage(messageIndex);
                    }
                });

                actionsDiv.appendChild(regenBtn);
                messageDiv.appendChild(actionsDiv);
            }

            if (role === 'user' && messageNode) {
                const siblingUserIds = getUserSiblingIds(messageNode.id);
                if (siblingUserIds.length > 1) {
                    const currentIndex = siblingUserIds.indexOf(messageNode.id);
                    if (currentIndex !== -1) {
                        const actionsDiv = document.createElement('div');
                        actionsDiv.className = 'message-actions';

                        const prevBtn = document.createElement('button');
                        prevBtn.type = 'button';
                        prevBtn.className = 'icon-btn fork-nav-btn';
                        prevBtn.setAttribute('aria-label', 'Previous fork');
                        prevBtn.title = 'Previous fork';
                        prevBtn.textContent = '⟨';
                        prevBtn.disabled = isGenerating || currentIndex === 0;
                        prevBtn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            switchUserFork(messageIndex, -1);
                        });

                        const forkIndicator = document.createElement('span');
                        forkIndicator.className = 'fork-indicator';
                        forkIndicator.textContent = `${currentIndex + 1}/${siblingUserIds.length}`;

                        const nextBtn = document.createElement('button');
                        nextBtn.type = 'button';
                        nextBtn.className = 'icon-btn fork-nav-btn';
                        nextBtn.setAttribute('aria-label', 'Next fork');
                        nextBtn.title = 'Next fork';
                        nextBtn.textContent = '⟩';
                        nextBtn.disabled = isGenerating || currentIndex === siblingUserIds.length - 1;
                        nextBtn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            switchUserFork(messageIndex, 1);
                        });

                        actionsDiv.appendChild(prevBtn);
                        actionsDiv.appendChild(forkIndicator);
                        actionsDiv.appendChild(nextBtn);
                        messageDiv.appendChild(actionsDiv);
                    }
                }
            }

            chatWrapper.appendChild(messageDiv);

            chatContainer.scrollTop = chatContainer.scrollHeight;
            return { contentDiv, regenBtn };
        }

        function switchUserFork(messageIndex, direction) {
            if (messageIndex < 0 || messageIndex >= messages.length || isGenerating) return;

            const messageData = messages[messageIndex];
            const currentNode = getNode(messageData.id);
            if (!currentNode || currentNode.role !== 'user' || currentNode.parentId === null) return;

            const parentNode = getNode(currentNode.parentId);
            if (!parentNode) return;

            const siblingUserIds = getUserSiblingIds(currentNode.id);
            const currentIndex = siblingUserIds.indexOf(currentNode.id);
            if (currentIndex === -1) return;

            const targetIndex = currentIndex + direction;
            if (targetIndex < 0 || targetIndex >= siblingUserIds.length) return;

            parentNode.activeChildId = siblingUserIds[targetIndex];
            editingParentId = null;
            editSession = null;
            renderMessages();
        }

        function editMessage(messageIndex) {
            // Find the message in the messages array
            if (messageIndex < 0 || messageIndex >= messages.length) return;

            const messageToEdit = messages[messageIndex];
            if (messageToEdit.role !== 'user') return;

            const messageNode = getNode(messageToEdit.id);
            if (!messageNode || messageNode.parentId === null) return;

            if (!editSession) {
                editSession = {
                    activeLeafId: getCurrentLeafId(),
                    inputValue: chatInput.value,
                    editingParentId: editingParentId,
                };
            }

            // Copy message content to input and show history up to the message's parent
            chatInput.value = messageToEdit.content;
            setInputHeight();
            editingParentId = messageNode.parentId;
            renderMessages();

            // Enable send button and focus input
            sendButton.disabled = false;
            chatInput.focus();
        }

        async function generateAssistantResponse(parentNodeId) {
            isGenerating = true;
            sendButton.disabled = true;
            let didCompleteResponse = false;

            const pendingMessageDiv = document.createElement('div');
            pendingMessageDiv.className = 'message assistant';
            const assistantContent = document.createElement('div');
            assistantContent.className = 'message-content';
            assistantContent.innerHTML = '<span class="typing-indicator"></span>';
            pendingMessageDiv.appendChild(assistantContent);
            chatWrapper.appendChild(pendingMessageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const queryParams = new URLSearchParams({ time_zone: timeZone });
                if (latitude !== null && longitude !== null) {
                    queryParams.append("latitude", latitude)
                    queryParams.append("longitude", longitude)
                }

                const response = await fetch(`${apiUrl}/chat?${queryParams.toString()}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        conversation_uuid: conversation_uuid,
                        messages: getConversationMessagesUpTo(parentNodeId),
                    }),
                });

                if (!response.ok) {
                    const error = await response.json()
                    const errorDetail = error?.detail || response.statusText
                    throw new Error(`HTTP ${response.status} error: ${errorDetail}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = '';
                let streamBuffer = '';

                const processStreamLine = (line) => {
                    if (!line) return;

                    let payload;
                    try {
                        payload = JSON.parse(line);
                    } catch (parseError) {
                        throw new Error(`Invalid stream payload: ${line}`);
                    }

                    if ('chunk' in payload && typeof payload['chunk'] === 'string') {
                        if (fullResponse === '') {
                            assistantContent.textContent = '';
                        }
                        fullResponse += payload['chunk'];
                        assistantContent.textContent = fullResponse;
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                    } else if ('prompt_uuid' in payload) {
                        console.log('Prompt:', payload);
                    }
                };

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    streamBuffer += decoder.decode(value, { stream: true });

                    let newlineIndex = streamBuffer.indexOf('\n');
                    while (newlineIndex !== -1) {
                        const line = streamBuffer.slice(0, newlineIndex).trim();
                        streamBuffer = streamBuffer.slice(newlineIndex + 1);
                        processStreamLine(line);
                        newlineIndex = streamBuffer.indexOf('\n');
                    }
                }

                streamBuffer += decoder.decode();
                const finalLine = streamBuffer.trim();
                if (finalLine) {
                    processStreamLine(finalLine);
                }

                createMessageNode('assistant', fullResponse, parentNodeId);
                didCompleteResponse = true;
            } catch (error) {
                console.error('Error:', error);
                assistantContent.innerHTML = `<div class="error-message">Error: ${error.message}</div>`;
            } finally {
                isGenerating = false;
                sendButton.disabled = !chatInput.value.trim();
                if (didCompleteResponse) {
                    renderMessages();
                }
            }
        }

        async function regenerateMessage(messageIndex) {
            // Find the message in the messages array
            if (messageIndex < 0 || messageIndex >= messages.length) return;

            const messageToRegenerate = messages[messageIndex];
            if (messageToRegenerate.role !== 'assistant') return;

            const assistantNode = getNode(messageToRegenerate.id);
            if (!assistantNode || assistantNode.parentId === null) return;

            const parentNode = getNode(assistantNode.parentId);
            if (!parentNode) return;

            parentNode.activeChildId = null;
            editingParentId = null;
            editSession = null;
            renderMessages();

            // Regenerate the assistant response
            await generateAssistantResponse(parentNode.id);
        }

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message || isGenerating) return;

            const parentNodeId = editingParentId !== null ? editingParentId : getCurrentLeafId();

            editSession = null;
            editingParentId = null;
            chatInput.value = '';
            chatInput.style.height = 'auto';

            const userNode = createMessageNode('user', message, parentNodeId);
            if (!userNode) return;

            renderMessages();
            await generateAssistantResponse(userNode.id);
        }

        document.addEventListener('mousedown', function(event) {
            if (!editSession || isGenerating) return;

            const clickInsideInput = chatInput.contains(event.target);
            const clickOnSendButton = sendButton.contains(event.target);
            if (!clickInsideInput && !clickOnSendButton) {
                cancelEditSession();
            }
        });

        sendButton.disabled = false;

        // Autofocus the chat input on page load
        chatInput.focus();

        fetch(`${apiUrl}/conversation`)
            .then(response => response.json())
            .then(data => {
                console.log('Conversation:', data);
                conversation_uuid = data["conversation_uuid"]
            })
            .catch(error => {
                console.error('Service not available:', error);
                chatWrapper.innerHTML = '<div class="error-message">Service not available.</div>';
            });
    </script>
</body>
</html>
