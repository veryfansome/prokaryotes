<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Prokaryotes</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="stylesheet" href="/common.css">
    <link rel="stylesheet" href="/highlight.min.css">
    <style>
        .logout-btn {
            width: 32px;
            height: 32px;
            padding: 0;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            background-color: #ffffff;
            color: #6b7280;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .logout-btn:hover {
            background-color: #f3f4f6;
            border-color: #d1d5db;
            color: #374151;
        }

        body {
            height: 100dvh;
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            background-color: #ffffff;
        }

        .chat-wrapper {
            max-width: 48rem;
            margin: 0 auto;
            padding: 2rem 1.5rem var(--input-height, 100px);
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
        }

        .message-actions {
            align-self: flex-start;
            margin-top: 0.35rem;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message.user {
            align-items: flex-end;
            justify-content: flex-start;
        }

        .message-content {
            line-height: 1.6;
            max-width: 100%;
        }

        .message-content p {
            margin: 0 0 0.5em;
        }

        .message-content p:first-child {
            margin-top: 0;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content pre {
            position: relative;
            border-radius: 0.5rem;
            overflow: hidden;
            margin: 0.5em 0;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', 'Courier New', monospace;
            font-size: 0.875rem;
            line-height: 1.5;
        }

        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            padding: 0;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 0.3rem;
            color: #9ca3af;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s ease, background 0.15s ease, color 0.15s ease;
        }

        .message-content pre:hover .copy-btn {
            opacity: 1;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            color: #f3f4f6;
        }

        .message-content code {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', 'Courier New', monospace;
            font-size: 0.875em;
            background-color: rgba(0, 0, 0, 0.06);
            padding: 0.1em 0.3em;
            border-radius: 0.25rem;
        }

        .message-content pre code {
            background-color: #000;
            font-size: inherit;
            padding-right: 2.75rem; /* reserve space so the copy button never overlaps code text */
        }

        .message-content ul,
        .message-content ol {
            padding-left: 1.5rem;
            margin: 0.5em 0;
        }

        .message-content li {
            margin: 0.2em 0;
        }

        .message-content h1,
        .message-content h2,
        .message-content h3,
        .message-content h4,
        .message-content h5,
        .message-content h6 {
            margin: 0.75em 0 0.25em;
            font-weight: 600;
            line-height: 1.3;
        }

        .message-content h1 { font-size: 1.5em; }
        .message-content h2 { font-size: 1.25em; }
        .message-content h3 { font-size: 1.1em; }

        .message-content a {
            color: #2563eb;
            text-decoration: underline;
        }

        .message-content blockquote {
            margin: 0.5em 0;
            padding-left: 1rem;
            border-left: 3px solid #d1d5db;
            color: #6b7280;
        }

        .message-content table {
            border-collapse: collapse;
            margin: 0.5em 0;
            max-width: 100%;
        }

        .message-content th,
        .message-content td {
            border: 1px solid #e5e7eb;
            padding: 0.35em 0.75em;
            text-align: left;
        }

        .message-content th {
            background-color: #f9fafb;
            font-weight: 600;
        }

        .message.assistant .message-actions {
            justify-content: flex-start;
            margin-left: -0.25rem;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .message.assistant:hover .message-actions {
            opacity: 1;
        }

        .message.user .message-actions {
            align-self: flex-end;
            margin-right: 0.15rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .message.user .fork-indicator {
            font-size: 0.75rem;
            color: #6b7280;
            min-width: 2.25rem;
            text-align: center;
            user-select: none;
        }

        .message.user .fork-nav-btn {
            width: 28px;
            height: 28px;
            font-size: 1rem;
            font-weight: 700;
            line-height: 1;
        }

        .message.assistant .message-content {
            background: transparent;
            border: none;
            cursor: pointer;
            border-radius: 0.5rem;
            padding: 0.5rem;
            margin-left: -0.5rem;
            transition: background-color 0.2s ease;
        }

        .message.assistant .message-content:hover {
            background-color: #f9fafb;
        }

        .icon-btn {
            width: 28px;
            height: 28px;
            padding: 0;
            border: 0;
            border-radius: 9999px;
            background-color: #ffffff;
            color: #6b7280;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .icon-btn:hover:not(:disabled) {
            background-color: #f3f4f6;
            border-color: #d1d5db;
            color: #374151;
        }

        .icon-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .message.user .message-content {
            background-color: #f3f4f6;
            border-radius: 1.25rem;
            padding: 0.8rem 1rem;
            max-width: 65%;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .message.user .message-content:hover {
            background-color: #e5e7eb;
        }

        .message.user .message-content.editing-source {
            outline: 2px solid #2563eb;
            outline-offset: 2px;
            background-color: #dbeafe;
        }

        .message.console .message-content {
            white-space: pre-wrap;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', 'Courier New', monospace;
            font-size: 0.875rem;
            background-color: #fafafa;
            padding: 0.75rem 1rem;
            color: #374151;
            max-width: 80%;
        }

        .input-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            background-color: #ffffff;
            padding: 1rem;
            padding-bottom: calc(1rem + env(safe-area-inset-bottom));
            border-top: 1px solid #f3f4f6;
        }

        .input-wrapper {
            max-width: 48rem;
            margin: 0 auto;
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .edit-status {
            max-width: 48rem;
            margin: 0.5rem auto 0;
            font-size: 0.875rem;
            color: #1d4ed8;
        }

        .context-status {
            max-width: 48rem;
            margin: 0 auto 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .context-meter {
            flex: 1;
            height: 3px;
            overflow: hidden;
            border-radius: 9999px;
            background-color: #e5e7eb;
        }

        .context-fill {
            width: 0;
            height: 100%;
            background-color: #2563eb;
            transition: width 0.2s ease;
        }

        .compaction-indicator {
            font-size: 0.75rem;
            color: #6b7280;
            white-space: nowrap;
            animation: typing 1.4s infinite;
        }

        .chat-input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.75rem;
            background-color: #ffffff;
            color: #111827;
            font-size: 1rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            min-height: 54px;
            max-height: 200px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .chat-input::placeholder {
            color: #9ca3af;
        }

        .chat-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .send-button {
            flex-shrink: 0;
            padding: 0;
            width: 54px;
            height: 54px;
            border: 1px solid #111827;
            border-radius: 0.75rem;
            background-color: #111827;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .send-button:hover:not(:disabled) {
            background-color: #2563eb;
            border-color: #2563eb;
        }

        .send-button:disabled {
            cursor: not-allowed;
            border-color: #d1d5db;
            background-color: #e5e7eb;
            color: #9ca3af;
        }

        .typing-indicator {
            display: inline-block;
            color: #6b7280;
            letter-spacing: 0.15em;
        }

        .typing-indicator::after {
            content: '···';
            animation: typing 1.4s infinite;
        }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.2; }
            30% { opacity: 1; }
        }

        .loading-indicator {
            margin-top: 0.4rem;
        }

        .error-message {
            background-color: #fee2e2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <a class="logout-btn" href="/logout" title="Log out" aria-label="Log out">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <path d="M16 17l5-5-5-5"></path>
                    <path d="M21 12H9"></path>
                </svg>
            </a>
            <h1>prokaryotes</h1>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="chat-wrapper" id="chatWrapper">
            <!-- Messages will be added here -->
        </div>
    </div>

    <div class="input-container" id="inputContainer">
        <div class="context-status">
            <div class="context-meter" aria-hidden="true">
                <div id="context-fill" class="context-fill"></div>
            </div>
            <div id="compaction-indicator" class="compaction-indicator" hidden>Compressing context...</div>
        </div>
        <div class="input-wrapper">
            <textarea
                id="chatInput"
                class="chat-input"
                placeholder="Ask anything"
                rows="1"
            ></textarea>
            <button id="sendButton" class="send-button" disabled>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 2L11 13"></path>
                    <path d="M22 2l-7 20-4-9-9-4 20-7z"></path>
                </svg>
            </button>
        </div>
        <div id="editStatus" class="edit-status" hidden></div>
    </div>
    <script src="/highlight.min.js"></script>
    <script src="/markdown-it.min.js"></script>
    <script src="/purify.min.js"></script>
    <script type="module" src="/ui.js"></script>
</body>
</html>
