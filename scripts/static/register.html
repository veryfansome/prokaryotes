<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Prokaryotes - Register</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="stylesheet" href="/common.css">
    <link rel="stylesheet" href="/common-auth.css">
    <style>
        .check {
            display: inline-flex;
            align-items: flex-start;
            gap: 0.5rem;
            color: #374151;
            font-size: 0.95rem;
            margin: 0.25rem 0 1rem;
        }

        .check input {
            width: 1rem;
            height: 1rem;
            margin-top: 0.15rem;
            accent-color: #111827;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <!--<img class="header-logo" src="/logo.png" alt="Prokaryotes logo">-->
            <h1>prokaryotes</h1>
        </div>
    </header>

    <main class="page">
        <section class="auth-card" aria-labelledby="register-title">
            <h2 class="auth-title" id="register-title">Create your account</h2>
            <p class="auth-subtitle">Get started in a few steps.</p>
            <div id="statusMessage" class="status-message" hidden></div>

            <form action="/register" method="post">
                <div class="form-group">
                    <label class="form-label" for="full-name">Full name</label>
                    <input class="form-input" id="full-name" name="full_name" type="text" placeholder="Jane Doe" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-input" id="email" name="email" type="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" id="password" name="password" type="password" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm-password">Confirm password</label>
                    <input class="form-input" id="confirm-password" name="confirm_password" type="password" placeholder="Re-enter your password" required>
                </div>

                <label class="check" for="terms">
                    <input id="terms" name="terms" type="checkbox" required>
                    <span>I agree to the <a class="link" href="#">terms</a> and <a class="link" href="#">privacy policy</a>.</span>
                </label>

                <button class="submit-button" type="submit">Create account</button>
            </form>

            <p class="switch-text">
                Already have an account?
                <a class="link" href="/login">Log in</a>
            </p>
        </section>
    </main>
    <script src="/common-auth.js"></script>
</body>
</html>
